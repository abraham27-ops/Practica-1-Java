<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
</head>
<body>
    

    <Script>
        let a = 5;
        let b = 16;
        let suma = a + b;

        console.log("Suma: " + suma);

        let resta = a - b;
        console.log("Resta: " + resta);

        let multi = a * b;
        console.log("Multiplicacion: " + multi);

        let division = a / b;
        console.log("Division: " + division);
    </Script>
</body>
</html>
